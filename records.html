<!DOCTYPE html>
<html>
<head>
    <title>Records</title>
</head>
<body>

<h2>All Registrations</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Event</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
