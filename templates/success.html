<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #ffffff;
        }

        .box {
            background-color: white;
            display: inline-block;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        a {
            color: blue;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="box">
        <h2>Registration Successful</h2>

        <p>Name: {{ name }}</p>
        <p>Event: {{ event }}</p>
        <p>Email: {{ email }}</p>
        <p>Department: {{ department }}</p>

        <br>

        <a href="/">Go Back</a>
    </div>

</body>
</html>
